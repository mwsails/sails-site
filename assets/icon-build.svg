<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none" aria-hidden="true">
  <defs>
    <radialGradient id="build-bg" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#1a2a73"/>
      <stop offset="100%" stop-color="#0D1B4B"/>
    </radialGradient>
    <linearGradient id="build-mainsail" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#dfe5f5"/>
    </linearGradient>
    <linearGradient id="build-jib" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2B60BE"/>
      <stop offset="100%" stop-color="#1f4ea3"/>
    </linearGradient>
    <linearGradient id="build-hull" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2B60BE"/>
      <stop offset="100%" stop-color="#163a8a"/>
    </linearGradient>
  </defs>

  <rect width="200" height="200" fill="url(#build-bg)"/>

  <!-- Rising chart line in background -->
  <g opacity="0.4">
    <polyline points="22,150 50,138 78,118 106,98 134,82 162,60 180,52"
              fill="none" stroke="#2B60BE" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <g fill="#5a8ee0">
      <circle cx="50" cy="138" r="2.5"/>
      <circle cx="78" cy="118" r="2.5"/>
      <circle cx="106" cy="98" r="2.5"/>
      <circle cx="134" cy="82" r="2.5"/>
      <circle cx="162" cy="60" r="2.5"/>
    </g>
  </g>

  <!-- Blueprint grid overlay (subtle) -->
  <g opacity="0.12" stroke="#5a8ee0" stroke-width="0.6">
    <line x1="0" y1="40" x2="200" y2="40"/>
    <line x1="0" y1="80" x2="200" y2="80"/>
    <line x1="0" y1="120" x2="200" y2="120"/>
    <line x1="0" y1="160" x2="200" y2="160"/>
    <line x1="40" y1="0" x2="40" y2="200"/>
    <line x1="80" y1="0" x2="80" y2="200"/>
    <line x1="120" y1="0" x2="120" y2="200"/>
    <line x1="160" y1="0" x2="160" y2="200"/>
  </g>

  <!-- Mast -->
  <line x1="100" y1="30" x2="100" y2="146" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Pennant flag -->
  <polygon points="100,30 116,36 100,42" fill="#2B60BE"/>

  <!-- Main sail (white, large, right of mast) -->
  <path d="M 100 38 L 158 146 L 100 146 Z" fill="url(#build-mainsail)"/>

  <!-- Jib sail (accent blue, left of mast) -->
  <path d="M 100 50 L 56 142 L 100 142 Z" fill="url(#build-jib)"/>

  <!-- Sail seams -->
  <g stroke="#0D1B4B" stroke-width="0.8" opacity="0.25">
    <line x1="100" y1="70" x2="138" y2="146"/>
    <line x1="100" y1="100" x2="120" y2="146"/>
  </g>
  <g stroke="#ffffff" stroke-width="0.8" opacity="0.35">
    <line x1="100" y1="82" x2="72" y2="142"/>
    <line x1="100" y1="112" x2="86" y2="142"/>
  </g>

  <!-- Hull -->
  <path d="M 46 146 L 168 146 L 152 168 L 62 168 Z" fill="url(#build-hull)"/>
  <path d="M 46 146 L 168 146 L 164 152 L 50 152 Z" fill="#ffffff" opacity="0.25"/>

  <!-- Water -->
  <path d="M 14 178 Q 50 172 86 178 T 158 178 T 200 176" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.45"/>
  <path d="M 0 188 Q 40 184 80 188 T 156 188 T 200 186" stroke="#2B60BE" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.5"/>

  <!-- Construction caliper marks near top -->
  <g stroke="#5a8ee0" stroke-width="1" stroke-linecap="round" opacity="0.55">
    <line x1="86" y1="44" x2="78" y2="44"/>
    <line x1="78" y1="42" x2="78" y2="46"/>
  </g>
</svg>
