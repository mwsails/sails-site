<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none" aria-hidden="true">
  <defs>
    <radialGradient id="coach-bg" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#1a2a73"/>
      <stop offset="100%" stop-color="#0D1B4B"/>
    </radialGradient>
    <radialGradient id="coach-wheel" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3a72d0"/>
      <stop offset="70%" stop-color="#2B60BE"/>
      <stop offset="100%" stop-color="#1f4ea3"/>
    </radialGradient>
    <linearGradient id="coach-hub" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#cfd8ee"/>
    </linearGradient>
  </defs>

  <rect width="200" height="200" fill="url(#coach-bg)"/>

  <!-- Course-line chart trailing behind the wheel -->
  <g opacity="0.55">
    <path d="M 20 160 Q 50 155 75 140 T 130 110 T 170 70"
          fill="none" stroke="#2B60BE" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="4 5"/>
    <g fill="#ffffff">
      <circle cx="20" cy="160" r="2.5"/>
      <circle cx="75" cy="140" r="2.5"/>
      <circle cx="130" cy="110" r="2.5"/>
      <circle cx="170" cy="70" r="3.5"/>
    </g>
    <!-- Direction arrow at end -->
    <polygon points="170,62 178,72 162,72" fill="#ffffff"/>
  </g>

  <!-- Ship's wheel -->
  <g transform="translate(100 100)">
    <!-- Outer rim -->
    <circle r="46" fill="none" stroke="#ffffff" stroke-width="3"/>
    <circle r="46" fill="none" stroke="#2B60BE" stroke-width="1" opacity="0.5"/>

    <!-- 8 outer handles (the classic ship's wheel pegs) -->
    <g fill="#ffffff" stroke="#0D1B4B" stroke-width="0.8">
      <circle cx="0" cy="-54" r="5"/>
      <circle cx="38" cy="-38" r="5"/>
      <circle cx="54" cy="0" r="5"/>
      <circle cx="38" cy="38" r="5"/>
      <circle cx="0" cy="54" r="5"/>
      <circle cx="-38" cy="38" r="5"/>
      <circle cx="-54" cy="0" r="5"/>
      <circle cx="-38" cy="-38" r="5"/>
    </g>

    <!-- 8 spokes -->
    <g stroke="#ffffff" stroke-width="2.5" stroke-linecap="round">
      <line x1="0" y1="-46" x2="0" y2="-12"/>
      <line x1="32.5" y1="-32.5" x2="8.5" y2="-8.5"/>
      <line x1="46" y1="0" x2="12" y2="0"/>
      <line x1="32.5" y1="32.5" x2="8.5" y2="8.5"/>
      <line x1="0" y1="46" x2="0" y2="12"/>
      <line x1="-32.5" y1="32.5" x2="-8.5" y2="8.5"/>
      <line x1="-46" y1="0" x2="-12" y2="0"/>
      <line x1="-32.5" y1="-32.5" x2="-8.5" y2="-8.5"/>
    </g>

    <!-- Inner hub ring -->
    <circle r="14" fill="url(#coach-wheel)" stroke="#ffffff" stroke-width="1.5"/>
    <circle r="6" fill="url(#coach-hub)"/>
    <circle r="2" fill="#0D1B4B"/>
  </g>
</svg>
