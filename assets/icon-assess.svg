<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none" aria-hidden="true">
  <defs>
    <radialGradient id="assess-bg" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#1a2a73"/>
      <stop offset="100%" stop-color="#0D1B4B"/>
    </radialGradient>
    <linearGradient id="assess-disk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2B60BE"/>
      <stop offset="100%" stop-color="#1f4ea3"/>
    </linearGradient>
    <linearGradient id="assess-needle" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#cfd8ee"/>
    </linearGradient>
  </defs>

  <!-- Circular vignette background -->
  <rect width="200" height="200" fill="url(#assess-bg)"/>

  <!-- Bar chart behind compass -->
  <g opacity="0.55">
    <rect x="34" y="128" width="14" height="28" rx="2" fill="#2B60BE"/>
    <rect x="54" y="116" width="14" height="40" rx="2" fill="#3a72d0"/>
    <rect x="74" y="98"  width="14" height="58" rx="2" fill="#5a8ee0"/>
    <rect x="132" y="118" width="14" height="38" rx="2" fill="#3a72d0"/>
    <rect x="152" y="106" width="14" height="50" rx="2" fill="#5a8ee0"/>
  </g>

  <!-- Compass outer ring -->
  <circle cx="100" cy="92" r="44" fill="#0D1B4B" stroke="#ffffff" stroke-width="2.5"/>
  <circle cx="100" cy="92" r="44" fill="none" stroke="#2B60BE" stroke-width="1.5" opacity="0.7"/>

  <!-- Compass tick marks -->
  <g stroke="#ffffff" stroke-width="1.5" stroke-linecap="round">
    <line x1="100" y1="52" x2="100" y2="58"/>
    <line x1="100" y1="126" x2="100" y2="132"/>
    <line x1="60" y1="92" x2="66" y2="92"/>
    <line x1="134" y1="92" x2="140" y2="92"/>
  </g>
  <g stroke="#ffffff" stroke-width="1" stroke-linecap="round" opacity="0.55">
    <line x1="72" y1="64" x2="76" y2="68"/>
    <line x1="128" y1="64" x2="124" y2="68"/>
    <line x1="72" y1="120" x2="76" y2="116"/>
    <line x1="128" y1="120" x2="124" y2="116"/>
  </g>

  <!-- Compass disk -->
  <circle cx="100" cy="92" r="30" fill="url(#assess-disk)"/>

  <!-- Compass needle: north (white) + south (navy) -->
  <polygon points="100,64 106,92 100,90 94,92" fill="url(#assess-needle)"/>
  <polygon points="100,120 94,92 100,94 106,92" fill="#0b1230"/>
  <circle cx="100" cy="92" r="4" fill="#ffffff"/>
  <circle cx="100" cy="92" r="1.5" fill="#0D1B4B"/>

  <!-- Magnifying glass overlay -->
  <g transform="translate(132 124)">
    <circle cx="0" cy="0" r="18" fill="rgba(255,255,255,0.06)" stroke="#ffffff" stroke-width="2.5"/>
    <circle cx="0" cy="0" r="14" fill="none" stroke="#2B60BE" stroke-width="1" opacity="0.6"/>
    <line x1="13" y1="13" x2="26" y2="26" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="-6" y1="-6" x2="-2" y2="-2" stroke="#ffffff" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  </g>
</svg>
